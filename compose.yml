version: "3.9"

services:
  devopsdb:
    image: swarnakalle/web:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: "1000M"
        reservations:
          cpus: "0.5"
          memory: "500M"
    networks:
      - mynetwork
    volumes:
      - myvolume:/var/lib/mysql

  application:
    image: swarnakalle/web:login
    ports:
      - "2222:8080"
    deploy:
      replicas: 3
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay

volumes:
  myvolume:
